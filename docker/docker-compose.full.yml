services:
  # ─────────────────────────────────────────────
  # KhunQuant Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm khunquant-agent -m "Hello"
  # ─────────────────────────────────────────────
  khunquant-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: khunquant-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.khunquant/config.json:ro
      - khunquant-workspace:/root/.khunquant/workspace
      - khunquant-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["khunquant", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # KhunQuant Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  khunquant-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: khunquant-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.khunquant/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - khunquant-workspace:/root/.khunquant/workspace
      # NPM cache for faster MCP server installs
      - khunquant-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  khunquant-workspace:
  khunquant-npm-cache: # Cache npm packages to speed up MCP server installations

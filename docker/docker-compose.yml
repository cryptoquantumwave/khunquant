services:
  # ─────────────────────────────────────────────
  # KhunQuant Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm khunquant-agent -m "Hello"
  # ─────────────────────────────────────────────
  khunquant-agent:
    image: docker.io/khunquant/khunquant:latest
    container_name: khunquant-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.khunquant
    entrypoint: ["khunquant", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # KhunQuant Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  khunquant-gateway:
    image: docker.io/khunquant/khunquant:latest
    container_name: khunquant-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.khunquant

  # ─────────────────────────────────────────────
  # KhunQuant Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  khunquant-launcher:
    image: docker.io/khunquant/khunquant:launcher
    container_name: khunquant-launcher
    restart: on-failure
    profiles:
      - launcher
    environment:
      - KHUNQUANT_GATEWAY_HOST=0.0.0.0
    ports:
      - "127.0.0.1:18800:18800"
      - "127.0.0.1:18790:18790"
    volumes:
      - ./data:/root/.khunquant
